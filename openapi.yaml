  '/-/package/{package}/trust':
    get:
      tags:
        - Trust
      summary: Get all trusted publisher configurations for package
      description: >
        Retrieve all trusted publisher configurations for a package.


        This endpoint allows users with write permission to the package to view
        all existing trusted publisher

        configurations that have been set up for OIDC token exchange for their
        package.


        ## Configuration Structure


        The structure of the payload follows a specific design. Each trusted
        provider has their own unique set of claims.

        In order to keep things clear and consistent, the properties to create a
        provider match the claims structure.

        The caveat is when a claim requires partial matching through parsing.


        - All configurations MUST include a `type`, `claims` object, and
        `permissions` array

        - Top-level "claims" MUST match the cloud provider's exact claim
        properties

        - Claims MAY use exact string matching when supported

        - Claims MAY use an object structure to define one or multiple partial
        matching rules

        - Partial matching properties MUST be defined and documented by this API
        specification

        - This documentation SHALL only provide matches for specifically defined
        claim items


        ## Requirements

        - Package MUST exist

        - User MUST have write permission to the package

        - MUST have 2FA enabled on their account

        - User MUST be authenticated
      operationId: getTrustedPublishers
      parameters:
        - name: package
          in: path
          required: true
          schema:
            type: string
          description: 'Name of the npm package, url-encoded'
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
            pattern: ^Bearer .+

openapi: 3.0.3
info:
  title: npm Registry API
  version: 1.0.0
  license:
    name: MIT
    url: 'https://opensource.org/licenses/MIT'
  description: |
    Welcome to the npm registry API documentation!
  x-logo:
    url: >
      data:image/png;base64,
    altText: npm logo
servers:
  - url: 'https://registry.npmjs.org'
tags:
  - name: Introduction
    x-displayName: Introduction
    description: >
      This is the API documentation for the npm registry. For information about
      the npm registry, website, and command-line interface (CLI), please refer
      to [https://docs.npmjs.com](https://docs.npmjs.com).
  - name: Authentication
    x-displayName: Authentication & Authorization
    description: >
      The npm registry API supports multiple types of bearer tokens for
      authentication:


      **Token Types:**


      **1. npm Session Token (`npmSessionToken`)**

      Traditional npm session tokens created via `npm login`. These tokens:

      - Are tied to a user account

      - Inherit the user's permissions

      - Have limited expiration

      - **Required for:** User account management, token creation/management


      **2. npm Access Token (`npmAccessToken`)**

      Fine-grained tokens with specific permissions:

      - Can be scoped to specific packages and organizations

      - Can be scoped to specific operations (read, write, publish)

      - Have configurable expiration

      - **Supported for:** Most package operations where explicitly documented


      **3. OIDC id_token (`oidcIdToken`)**

      Tokens from supported Identity Providers (CI/CD systems):

      - From GitHub Actions, GitLab CI, CircleCI, etc.

      - Must have `aud` claim set to `npm:registry.npmjs.org`

      - Short-lived tokens

      - **Required for:** OIDC token exchange only


      **4. OIDC Exchange Token (`oidcExchangeToken`)**

      Short-lived tokens obtained from OIDC token exchange:

      - Package-scoped permissions

      - Limited lifetime (typically 1 hour)

      - **Supported for:** Package publishing and management operations


      **Endpoint Authorization:**


      Each endpoint specifies which token types are accepted via security
      schemes.

      Some endpoints may accept multiple token types, others are restricted to
      specific types.


      **Example:**

      - `/tokens` endpoint: Only accepts `npmSessionToken`

      - `/oidc/token/exchange` endpoint: Only accepts `oidcIdToken`

      - Package publishing: May accept `npmSessionToken`, `npmAccessToken`, or
      `oidcExchangeToken`
  - name: Tokens
    x-displayName: Tokens
    description: >
      Token management endpoints for creating, listing, and deleting npm access
      tokens.
  - name: OIDC
    x-displayName: OIDC
    description: |
      OpenID Connect (OIDC) token exchange endpoints for CI/CD integrations.
  - name: Trust
    x-displayName: Trust
    description: |
      Trust-related endpoints for managing package trust and security settings.
paths:
  '/-/team/{orgName}/{teamName}/package':
    parameters:
      - $ref: ./api/shared-components.yaml#/components/parameters/OrgName
      - $ref: ./api/shared-components.yaml#/components/parameters/TeamName
      - $ref: >-
          ./api/shared-components.yaml#/components/parameters/RequiredBearerToken
    get:
      tags:
        - Access
      summary: Get all packages for a team
      description: >-
        Get all of the packages a team has access to, as well as the access
        level that team has for each package.
      operationId: getTeamPackageGrants
      security:
        - npmSessionToken: []
      responses:
        '200':
          $ref: '#/components/responses/PackageAccessLevels'
        '401':
          $ref: ./api/shared-components.yaml#/components/responses/Unauthorized
    put:
      tags:
        - Access
      summary: Grant access to a package for a team
      operationId: createTeamPackageGrant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                package:
                  type: string
                  description: The name of the package to give access to
                permissions:
                  type: string
                  enum:
                    - read-only
                    - read-write
                  description: The access level of the package to grant to the team
      security:
        - npmSessionToken: []
      responses:
        '201':
          $ref: ./api/shared-components.yaml#/components/responses/EmptySuccess
        '401':
          $ref: ./api/shared-components.yaml#/components/responses/Unauthorized
    delete:
      tags:
        - Access
      summary: Remove access to a package for a team
      operationId: deleteTeamPackageGrant
      security:
        - npmSessionToken: []
      responses:
        '204':
          $ref: ./api/shared-components.yaml#/components/responses/EmptySuccess
        '401':
          $ref: ./api/shared-components.yaml#/components/responses/Unauthorized
  '/-/org/{orgName}/package':
    parameters:
      - $ref: ./api/shared-components.yaml#/components/parameters/OrgName
      - $ref: >-
          ./api/shared-components.yaml#/components/parameters/RequiredBearerToken
    get:
      tags:
        - Access
      summary: Get all packages for an org
      description: >-
        Get all of the packages an org has access to, as well a the access level
        that org has for each pacakge.
      operationId: getOrgPackages
      security:
        - npmSessionToken: []
      responses:
        '200':
          $ref: '#/components/responses/PackageAccessLevels'
        '401':
          $ref: ./api/shared-components.yaml#/components/responses/Unauthorized
  '/-/package/{escapedPackageName}/collaborators':
    parameters:
      - $ref: ./api/shared-components.yaml#/components/parameters/EscapedPackageName
      - $ref: >-
          ./api/shared-components.yaml#/components/parameters/RequiredBearerToken
    get:
      tags:
        - Access
      summary: >-
        Get all of the users that have access to a package, as well as the
        access level that user has for each package.
      operationId: getPackageCollaborators
      security:
        - npmSessionToken: []
      responses:
        '200':
          $ref: '#/components/responses/UserAccessLevels'
        '401':
          $ref: ./api/shared-components.yaml#/components/responses/Unauthorized
  '/-/package/{escapedPackageName}/visibility':
    parameters:
      - $ref: ./api/shared-components.yaml#/components/parameters/EscapedPackageName
      - $ref: >-
          ./api/shared-components.yaml#/components/parameters/RequiredBearerToken
    get:
      tags:
        - Access
      summary: Get the visibility of a package.
      operationId: getPackageVisibility
      security:
        - npmSessionToken: []
      responses:
        '200':
          $ref: '#/components/responses/PackageVisibility'
        '401':
          $ref: ./api/shared-components.yaml#/components/responses/Unauthorized
  '/-/package/{escapedPackageName}/access':
    parameters:
      - $ref: ./api/shared-components.yaml#/components/parameters/EscapedPackageName
    post:
      tags:
        - Access
      summary: Sets the various access levels for a package.
      operationId: setPackageAccess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                access:
                  type: string
                  enum:
                    - public
                    - private
                  description: Visibility of a package
                publish_requires_tfa:
                  type: boolean
                  description: Whether publishing this package requires multifactor auth
                automation_token_overrides_tfa:
                  type: boolean
                  description: >-
                    Whether or not automation tokens override the requirement
                    for multifactor auth
      security:
        - npmSessionToken: []
      responses:
        '200':
          $ref: ./api/shared-components.yaml#/components/responses/EmptySuccess
        '401':
          $ref: ./api/shared-components.yaml#/components/responses/Unauthorized
  /-/npm/v1/security/advisories/bulk:
    post:
      tags:
        - Audit
      summary: Get advisories for packages
      description: Get advisories for a list of packages and version ranges
      operationId: bulkAudit
      requestBody:
        required: true
        description: Packages with their versions
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                x-additionalPropertiesName: '@npm/example-package'
                type: array
                description: Array of versions for this package
                items:
                  type: string
                  description: semver version
              example:
                '@npmcli/arborist':
                  - 1.0.0
                  - 2.0.1
                '@npmcli/config':
                  - 10.4.2
      security: []
      responses:
        '200':
          $ref: '#/components/responses/BulkAudit'
        '400':
          $ref: '#/components/responses/InvalidPayload'
  '/-/npm/v1/oidc/token/exchange/package/{package_name}':
    post:
      tags:
        - OIDC
      summary: Exchange OIDC id_token for npm registry token
      description: >
        Exchange a valid OIDC id_token (provided as a Bearer token) for a
        short-lived npm registry access token for the specified package.


        **OIDC Token Requirements:**

        - The Bearer token must be an OIDC id_token from a [supported Identity
        Provider
        (IdP)](https://docs.npmjs.com/trusted-publishers#supported-cicd-providers)

        - The `aud` (audience) claim must be set to `npm:registry.npmjs.org`


        **Important:** The Bearer token must be an OIDC id_token from an
        Identity Provider (IdP) npm supports. This endpoint differs from the
        rest of the API, which expects a standard npm access token.
      operationId: exchangeOidcToken
      parameters:
        - name: package_name
          in: path
          required: true
          schema:
            type: string
          description: 'Name of the npm package, url-encoded'
      security:
        - oidcIdToken: []
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  token_type:
                    type: string
                    enum:
                      - oidc
                  token:
                    type: string
                  created:
                    type: string
                    format: date-time
                    example: '2025-07-18T10:30:00.000Z'
                  expires:
                    type: string
                    format: date-time
                    example: '2025-07-18T11:30:00.000Z'
                required:
                  - token_type
                  - token
                  - created
                  - expires
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: OIDC token exchange error - bad request
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: OIDC token exchange error - unauthorized
        '404':
          description: Package not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: OIDC token exchange error - package not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: OIDC token exchange error - internal server error
  '/-/org/{orgName}/user':
    parameters:
      - $ref: ./api/shared-components.yaml#/components/parameters/OrgName
      - $ref: >-
          ./api/shared-components.yaml#/components/parameters/RequiredBearerToken
    get:
      tags:
        - Org
      summary: Get users in an org
      description: >-
        Get all of the users in an org, along with their access levels in that
        org
      operationId: getOrgMembership
      security:
        - npmSessionToken: []
      responses:
        '200':
          $ref: '#/components/responses/OrgMembers'
        '401':
          $ref: ./api/shared-components.yaml#/components/responses/Unauthorized
    put:
      tags:
        - Org
      summary: Set user membership in an org
      description: >-
        Set a user's membership in an org. If the user is not already a member,
        an invite will be sent.
      operationId: changeOrgMembership
      security:
        - npmSessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: string
                  description: Username to grant membership to org
                role:
                  type: string
                  enum:
                    - developer
                    - admin
                    - owner
                  description: Role to give user in org
      responses:
        '201':
          $ref: '#/components/responses/OrgInvite'
        '401':
          $ref: ./api/shared-components.yaml#/components/responses/Unauthorized
    delete:
      tags:
        - Org
      summary: Remove user membership in an org
      description: Remove a user's membership in an org
      operationId: deleteOrgMembership
      security:
        - npmSessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: string
                  description: Username to remove from the org
      responses:
        '204':
          $ref: ./api/shared-components.yaml#/components/responses/EmptySuccess
        '401':
          $ref: ./api/shared-components.yaml#/components/responses/Unauthorized
  '/{escapedPackageName}':
    parameters:
      - $ref: ./api/shared-components.yaml#/components/parameters/EscapedPackageName
      - $ref: >-
          ./api/shared-components.yaml#/components/parameters/RequiredBearerToken
    put:
      tags:
        - Publish
      summary: Publish a new version of a package
      operationId: publish
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                _id:
                  type: string
                  example: npm@2.0.0
                  description: The name and version of the package being published
                name:
                  type: string
                  example: npm
                  description: The name of the package being published
                description:
                  type: string
                  example: a package manager for JavaScript
                  description: The description of the package being published
                dist-tags:
                  type: object
                  description: dist-tag to apply for this new version
                  additionalProperties:
                    type: string
                    format: semver
                    description: 'version for this tag, must be the version being uploaded'
                  example:
                    latest: 2.0.0
                dist:
                  type: object
                  properties:
                    integrity:
                      type: string
                      format: sha512
                      description: sha512 integrity string for this version's tarball
                      example: >-
                        sha512-0p99G5Mu9FC3ixLarvgfU0O8xoc386LBll2UixE8rbSJrKRFoXbJFbGSOBN9exJiFXryiLDFFhCKjOOBxQ/dsQ==
                    shasum:
                      type: string
                      format: sha1
                      description: sha1 hex digest for this version's tarball
                      example: f783874393588901af1a4824a145fa009f174d9d
                    tarball:
                      type: string
                      format: url
                      description: >-
                        url for the tarball will live. This is overwritten by
                        the registry.
                      example: 'https://registry.npmjs.org/npm/-/npm-2.0.0.tgz'
                versions:
                  description: >-
                    manifest (package.json) of the package to be published,
                    indexed by the version being published
                  additionalProperties:
                    type: object
                    properties:
                      name:
                        type: string
                        description: package name
                      version:
                        type: string
                        format: semver
                        description: version of the package being published
                    additionalProperties:
                      oneOf:
                        - type: string
                        - type: object
                        - type: array
                      description: other package.json content
                  example:
                    2.0.0:
                      name: npm
                      version: 2.0.0
                      description: A package manager for node
                access:
                  type: string
                  example: public
                  enum:
                    - public
                    - restricted
                  description: Access level for this package. Whether it is public or not.
                _attachments:
                  type: object
                  description: Tarball and provenance attestation attachments
                  additionalProperties:
                    anyOf:
                      - type: object
                        properties:
                          content_type:
                            type: string
                            description: tarball content type
                            enum:
                              - application/octet-stream
                          data:
                            type: string
                            format: base64
                            description: base64 content of the tarball for this version
                          length:
                            type: integer
                            description: length of the tarball data string
                      - type: object
                        properties:
                          content_type:
                            type: string
                            description: sigstore content type
                          data:
                            type: string
                            format: base64
                            description: >-
                              base64 content of the provenance attestation for
                              this version
                          length:
                            type: integer
                            description: length of the provenance data string
                  example:
                    npm-2.0.0.tgz:
                      content_type: application/octet-stream
                      data: ZXhhbXBsZQo=
                      length: 13
                    npm-2.0.0.sigstore:
                      content_type: application/vnd.dev.sigstore.bundle+json;version=0.2
                      data: ZXhhbXBsZQo=
                      length: 13
      security:
        - npmAccessToken: []
        - npmSessionToken: []
        - granularAccessToken: []
        - oidcIdToken: []
      responses:
        '200':
          $ref: '#/components/responses/PublishSuccess'
        '401':
          $ref: ./api/shared-components.yaml#/components/responses/Unauthorized
  /-/v1/search:
    get:
      parameters:
        - name: text
          in: query
          required: true
          schema:
            type: string
          description: The search query text
        - name: size
          in: query
          schema:
            type: number
          description: The number of search results to return
        - name: from
          in: query
          schema:
            type: number
          description: The starting index of the search results
      tags:
        - Search
      summary: Search for packages on the registry
      description: Search for packages on the registry
      operationId: getsearch
      security: []
      responses:
        '200':
          $ref: '#/components/responses/SearchResults'
        '400':
          $ref: '#/components/responses/MissingField'
  /-/stage:
    get:
      tags:
        - Stage
      summary: Fetch a list of all staged package versions for the authenticated user.
      description: >
        Retrieve staged package versions that are awaiting maintainer review.


        This endpoint returns only items visible to the authenticated user.
        Results will be returned 

        in the order of most recently staged first in a descending order.
        Results are

        paginated and can be filtered by package name using the `package` query
        parameter.


        ## Requirements

        - User MUST be authenticated with a valid npm token
      operationId: getStageItems
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
            pattern: ^Bearer .+
          description: |
            Authentication header. Supports both Bearer authentication.

            **Formats:**
            - `Bearer <token>` - npm access token or granular access token

            **Accepted token types:**
            - npm access token (traditional user token)
        - name: package
          in: query
          required: false
          schema:
            type: string
          description: >-
            Filter the entire list of staged package versions by package name,
            url-encoded.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Page number for pagination (0-indexed)
        - name: perPage
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
          description: Number of items to return per page
      security:
        - npmAccessToken: []
        - granularAccessToken: []
      responses:
        '200':
          description: A list of staged package versions for the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StagePackageList'
              examples:
                success:
                  summary: Staged package versions retrieved successfully
                  value:
                    items:
                      - id: 1de6f3db-2ed9-4d72-b3dd-8f0e2b474a2f
                        packageName: '@npmcli/example-package'
                        version: 1.2.3
                        tag: latest
                        createdAt: '2026-03-16T09:00:00.000Z'
                        actor: octocat
                        actorType: user
                        access: public
                        shasum: 4f7f5f1d5bcf2f72f6e4d6c4f3b2812d8a2f6c19
                      - id: f8e7a45b-7a5f-4f31-8e6d-9dd1c6ef38c0
                        packageName: example-lib
                        version: 0.4.0
                        tag: next
                        createdAt: '2026-03-15T18:22:11.000Z'
                        actor: npm-bot
                        actorType: trusted automation
                        access: private
                        shasum: 8eb3b4e9b6e3d0d2c86be1e6d4f43f4be62e80ad
                    page: 0
                    perPage: 10
                    total: 2
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  '/-/stage/package/{package-name}':
    post:
      tags:
        - Stage
      summary: Publishes a package version to staging to be reviewed by maintainers.
      description: >
        Submit a package version to staging for maintainer review.


        The request body must contain a publish-style packument payload,
        including version

        metadata and package attachments. The staged item can then be reviewed,
        inspected,

        approved, or deleted by authorized maintainers.


        ## Requirements

        - Package MUST exist or be creatable by the authenticated publisher

        - User MUST be authenticated with a valid npm token

        - Request body MUST include required fields in `StagedPackumentRequest`
      operationId: stagePackageVersion
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
            pattern: ^Bearer .+
          description: |
            Authentication header. Supports both Bearer authentication.

            **Formats:**
            - `Bearer <token>` - npm access token or granular access token

            **Accepted token types:**
            - npm access token (traditional user token)
        - name: package-name
          in: path
          required: true
          schema:
            type: string
          description: >-
            The name of the package to stage, including scope if applicable,
            url-encoded and slash-escaped.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StagedPackumentRequest'
      security:
        - npmAccessToken: []
        - granularAccessToken: []
      responses:
        '201':
          description: The package version was successfully staged for review.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Package version staged successfully.
                  stageId:
                    type: string
                    format: uuid
                    description: >-
                      Unique identifier for the staged package version, used for
                      subsequent review actions.
              examples:
                success:
                  summary: Successful staging of package version
                  value:
                    message: Package version staged successfully.
                    stageId: f8e7a45b-7a5f-4f31-8e6d-9dd1c6ef38c0
        '400':
          description: >-
            Bad Request - The request body is missing required fields or
            contains invalid data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              examples:
                missing_fields:
                  summary: Missing required fields in request body
                  value:
                    message: >-
                      Bad Request - Missing required fields: name, version,
                      _attachments
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/PackageNotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  '/-/stage/{stage-id}':
    get:
      tags:
        - Stage
      summary: Get details about a specific staged package version.
      description: >
        Retrieve detailed metadata for a single staged package version.


        Use this endpoint to inspect a staged item before taking action,
        including package

        identity, version, dist-tag, creator, and tarball information.


        ## Requirements

        - `stage-id` MUST reference an existing staged package version

        - User MUST be authenticated with a valid npm token
      operationId: getStagePackageVersion
      parameters:
        - name: stage-id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique identifier for the staged package version.
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
            pattern: ^Bearer .+
          description: |
            Authentication header. Supports both Bearer authentication.

            **Formats:**
            - `Bearer <token>` - npm access token or granular access token

            **Accepted token types:**
            - npm access token (traditional user token)
      security:
        - npmAccessToken: []
        - granularAccessToken: []
      responses:
        '200':
          description: Details about the staged package version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StagePackageVersion'
              examples:
                success:
                  summary: Staged package version details retrieved successfully
                  value:
                    id: 1de6f3db-2ed9-4d72-b3dd-8f0e2b474a2f
                    packageName: '@npmcli/example-package'
                    version: 1.2.3
                    tag: latest
                    createdAt: '2026-03-16T09:00:00.000Z'
                    actor: octocat
                    actorType: user
                    access: public
                    shasum: 4f7f5f1d5bcf2f72f6e4d6c4f3b2812d8a2f6c19
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/StagePackageVersionNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Stage
      summary: Delete a staged package version.
      description: >
        Remove a staged package version from review.


        This endpoint permanently deletes the staging record identified by
        `stage-id`.

        Once deleted, the staged version can no longer be approved unless it is
        staged again.


        ## Requirements

        - `stage-id` MUST reference an existing staged package version

        - User MUST be authenticated with a valid npm token

        - User MUST provide a valid `npm-otp` value for 2FA accounts
      operationId: deleteStagePackageVersion
      parameters:
        - name: stage-id
          in: path
          required: true

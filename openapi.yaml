components:
  securitySchemes:
    oidcIdToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        OIDC id_token from a supported Identity Provider (IdP) such as GitHub
        Actions, GitLab CI, or CircleCI.

        The `aud` (audience) claim must be set to `npm:registry.npmjs.org`.


        **Supported Identity Providers:**

        - GitHub Actions

        - GitLab CI

        - CircleCI
    npmSessionToken:
      type: http
      scheme: bearer
      description: >
        Traditional npm session token created via `npm login`.

        These tokens are tied to a user account and inherit the user's
        permissions.
    npmAccessToken:
      type: http
      scheme: bearer
      description: |
        Granular Access Token (GAT) with fine-grained permissions.
        These tokens can be scoped to specific packages and operations.
    granularAccessToken:
      type: http
      scheme: bearer
      description: |
        Granular Access Token (GAT) with fine-grained permissions.
        These tokens can be scoped to specific packages and operations.
        (Alias for npmAccessToken)
    oidcExchangeToken:
      type: http
      scheme: bearer
      description: |
        Short-lived npm registry token obtained by exchanging an OIDC id_token
        via the `/oidc/token/exchange` endpoint. These tokens are package-scoped
        and have limited lifetime (typically 1 hour).
  responses:
    PackageAccessLevels:
      description: Packages with their access levels
      content:
        application/json:
          schema:
            type: object
            additionalProperties:
              type: string
            example:
              '@npmcli/arborist': read-write
              '@npmcli/config': read-only
    PackageVisibility:
      description: Packages with their visibility
      content:
        application/json:
          schema:
            type: object
            additionalProperties:
              type: string
            example:
              '@npmcli/arborist': public
              '@npmcli/hidden': private
    UserAccessLevels:
      description: User access levels
      content:
        application/json:
          schema:
            type: object
            additionalProperties:
              type: string
            example:
              npm: read-write
              microsoft: read-only
    InvalidPayload:
      description: Invalid request payload
      content:
        application/json:
          schema:
            type: object
            properties:
              statusCode:
                type: integer
                enum:
                  - 400
              error:
                type: string
                example: Bad Request
              message:
                type: string
                example: Invalid request payload input
    BulkAudit:
      description: Bulk audit response
      content:
        application/json:
          schema:
            type: object
            additionalProperties:
              x-additionalPropertiesName: '@npm/example-package'
              type: array
              description: Vulnerabilities for a given package
              items:
                type: object
                properties:
                  id:
                    type: integer
                    example: 100000
                  url:
                    type: string
                    format: uri
                    example: 'https://github.com/advisories/GHSA-xxxx-xxxx-xxxx'
                    description: URL for this advisory
                  title:
                    type: string
                    example: Prototype Pollution
                    description: Title for this advisory
                  severity:
                    type: string
                    enum:
                      - info
                      - low
                      - moderate
                      - high
                      - critical
                    description: Severity for this advisory
                  vulnerable_versions:
                    type: string
                    format: semver
                    example: '>1.0.1 <2.0.0'
                    description: Versions of this package that this advisory applies to
                  cwe:
                    type: array
                    description: Common Weakness Enumeration
                    items:
                      type: string
                      example: CWE-400
                  cvss:
                    type: object
                    description: Common Vulnerability Scoring System
                    properties:
                      score:
                        type: number
                        example: 7
                      vectorString:
                        type: string
                        example: 'CVSS:3.1/AV:L/AC:H/PR:L/UI:N/S:U/C:H/I:H/A:H'
    OrgMembers:
      description: Org members with their access levels
      content:
        application/json:
          schema:
            type: object
            additionalProperties:
              type: string
            example:
              npm: owner
              npm-cli-bot: developer
    OrgInvite:
      description: Confirmation about the org membership or invite that was generated
      headers:
        npm-notice:
          description: Additional info about the invite sent to the user
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              org:
                type: object
                properties:
                  name:
                    type: string
                    description: The name of the org
                  size:
                    type: string
                    description: 'current size of the org, including invites'
              user:
                type: string
                description: The username that was invited or edited
              role:
                type: string
                description: The role that the user was given in the org
    PublishSuccess:
      description: Successful Publish
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                enum:
                  - true
    MissingField:
      description: A required parameter was missing
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                description: Message explaining what was missing from the request

    Unauthorized:
      description: Unauthorized - missing or invalid authentication
      content:
        application/json:
          schema:
            oneOf:
              - type: object
                description: Error response for missing authentication
                properties:
                  message:
                    type: string
          examples:
            unauthorized:
              summary: No Authorization header provided
              description: >
                When no Authorization header is provided or the token is
                invalid.
              value:
                message: Unauthorized
    UnauthorizedWithWebAuthn:
      description: Unauthorized - missing or invalid authentication / OTP
      headers:
        npm-notice:
          description: >
            Notice header sent when 2FA is enabled and web auth headers are not
            present.

            Contains URL for WebAuthn security key authentication.
          schema:
            type: string
          example: >-
            Open https://www.npmjs.com/login/<uuid> to use your security key for
            authentication
      content:
        application/json:
          schema:
            oneOf:
              - type: object
                description: Error response for missing authentication or OTP
                properties:
                  message:
                    type: string
              - type: object
                description: Web authentication flow response
                properties:
                  authUrl:
                    type: string
                    format: uri
                    description: URL to authenticate via web browser
                  doneUrl:
                    type: string
                    format: uri
                    description: URL to poll for completion of authentication
                required:
                  - authUrl
                  - doneUrl
          examples:
            unauthorized:
              summary: No Authorization header provided
              description: >
                When no Authorization header is provided or the token is
                invalid.
              value:
                message: Unauthorized
            web_auth_flow:
              summary: 2FA enabled + npm-otp header omitted (web auth flow)
              description: >
                When user has 2FA enabled, omits the `npm-otp` header, and
                includes both `npm-auth-type=web` and `npm-command=stage`
                headers.
              value:
                authUrl: >-
                  https://www.npmjs.com/auth/cli/00000000-0000-0000-0000-000000000000
                doneUrl: >-
                  https://registry.npmjs.org/-/v1/done?authId=00000000-0000-0000-0000-000000000000
    Forbidden:
      description: 2fa required or insufficient permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
          examples:
            2fa_disabled:
              summary: Please enable 2fa for your account
              value:
                message: Please enable 2fa for your account
            insufficient_permissions:
              summary: Insufficient permissions to view resource
              value:
                message: Insufficient permissions to access this resource
    PackageNotFound:

  /-/npm/v1/tokens:
    post:
      tags:
        - Tokens
      summary: Create npm access token
      description: >
        Create a new npm access token with customizable permissions, scope
        restrictions,

        expiration, and CIDR IP range limitations.


        **Requirements:**

        - Must be authenticated

        - **Two-factor authentication is required for this endpoint**
          - If 2FA is enabled on your account, provide the OTP via the `npm-otp` header
          - If 2FA is not enabled, an email OTP will be sent and must be provided via the `npm-otp` header
          - For WebAuthn users, the OTP is returned in the `doneUrl` after authentication

        **Important notices:**

        - All responses include security notices via the `npm-notice` header
        regarding token limitations
      operationId: createToken
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
            pattern: ^Bearer .+
          description: |
            Bearer token for authentication. Must be an npm access token.

            **Format:** `Bearer <token>`

            **Accepted token types:**
            - npm access token (traditional user token created via `npm login`)
        - name: npm-otp
          in: header
          required: true
          schema:
            type: string
          description: >
            One-time password for two-factor authentication. Always required for
            this endpoint.


            **How to obtain the OTP:**

            - If 2FA is enabled on your account, provide the OTP from your
            configured 2FA method

            - If 2FA is not enabled, an email OTP will be sent and must be
            provided (format: `<8-digit-otp-from-email>`)

            - For WebAuthn users, the OTP is returned by polling the `doneUrl`
            which returns an OTP code after hardware authentication (format:
            `<16-digit-otp>`)
        - name: npm-auth-type
          in: header
          required: false
          schema:
            type: string
            enum:
              - web
          description: |
            Authentication type for web-based flow. When set to "web", enables
            browser-based authentication flow for WebAuthn users.
        - name: npm-command
          in: header
          required: false
          schema:
            type: string
            enum:
              - token
          description: |
            Command context for the request. When set to "token", indicates
            this is a token creation command.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  description: User password for authentication
                name:
                  type: string
                  description: Human-readable name for the token
                token_description:
                  type: string
                  description: Detailed description of token purpose
                  nullable: true
                expires:
                  oneOf:
                    - type: number
                    - type: string
                  description: >-
                    Expiration in days (number) or ISO date string. Read-write
                    tokens: maximum 90 days, defaults to 7 days. Read-only
                    tokens: unlimited maximum, defaults to 30 days
                bypass_2fa:
                  type: boolean
                  description: Allow token to bypass 2FA requirements
                  default: false
                cidr:
                  type: array
                  items:
                    type: string
                  description: IP ranges that can use this token
                  nullable: true
                packages:
                  type: array
                  items:
                    type: string
                  description: >-
                    Specific packages this token can access. Use ["*"] for all
                    packages. Empty arrays are treated as not provided
                scopes:
                  type: array
                  items:
                    type: string
                  description: >-
                    Scoped packages this token can access. Empty arrays are
                    treated as not provided
                orgs:
                  type: array
                  items:
                    type: string
                  description: >-
                    Organizations this token can access. Empty arrays are
                    treated as not provided
                packages_and_scopes_permission:
                  type: string
                  enum:
                    - read-only
                    - read-write
                    - no-access
                  description: >-
                    Permission for packages and scopes. Defaults to "read-only"
                    if packages/scopes arrays have length > 0, otherwise
                    "no-access"
                orgs_permission:
                  type: string
                  enum:
                    - read-only
                    - read-write
                    - no-access
                  description: >-
                    Permission for organizations. Defaults to "read-only" if
                    orgs array has length > 0, otherwise "no-access"
              required:
                - password
                - name
      security:
        - npmSessionToken: []
      responses:
        '201':
          description: Token created successfully
          headers:
            npm-notice:
              description: >
                Security notice regarding token limitations.

                Example: "SECURITY NOTICE: Granular tokens now limited to 90
                days with 2FA enforced by default. Update your CI/CD workflows
                to avoid disruption. Learn more:
                https://gh.io/npm-token-changes"
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                    description: The token ID (UUID format).
                    example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  name:
                    type: string
                    description: Human-readable name for the token.
                  description:
                    type: string
                    description: Detailed description of token purpose.
                    nullable: true
                  token:
                    type: string
                    description: >-
                      The full token value. IMPORTANT: This is the only time you
                      will see the complete token - store it securely. Format:
                      npm_<40 characters>
                    example: npm_aBcDeFgHiJkLmNoPqRsTuVwXyZ1234567890
                  expiry:
                    type: string
                    format: date-time
                    description: The expiration date of the token in ISO 8601 format.
                    nullable: true
                  cidr:
                    type: array
                    items:
                      type: string
                    description: List of CIDR ranges that can use this token.
                    nullable: true
                  bypass_2fa:
                    type: boolean
                    description: Indicates if the token can bypass 2FA requirements.
                  revoked:
                    type: string
                    format: date-time
                    description: >-
                      Timestamp when the token was revoked. null for active
                      tokens.
                    nullable: true
                  created:
                    type: string
                    format: date-time
                    description: Timestamp when the token was created.
                  updated:
                    type: string
                    format: date-time
                    description: >-
                      Timestamp when the token was last updated. null on
                      creation.
                    nullable: true
                  accessed:
                    type: string
                    format: date-time
                    description: >-
                      Timestamp when the token was last accessed. null on
                      creation.
                    nullable: true
                  permissions:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: 'Permission name (e.g., "package").'
                        action:
                          type: string
                          description: Permission action ("read" or "write").
                    description: List of permissions granted to this token.
                  scopes:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          description: 'Scope type (e.g., "package", "org").'
                        name:
                          type: string
                          description: Scope name.
                    description: List of scopes this token has access to.
        '400':
          description: Bad request - Invalid parameters or validation failure
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                missingName:
                  summary: Missing token name
                  value:
                    error: Token name is required
                packagesTypeValidation:
                  summary: Invalid type for packages field
                  value:
                    error: Packages must be an array
                scopesTypeValidation:
                  summary: Invalid type for scopes field
                  value:
                    error: Scopes must be an array
                orgsTypeValidation:
                  summary: Invalid type for organizations field
                  value:
                    error: Organizations must be an array
                invalidPackagesPermission:
                  summary: Invalid packages_and_scopes_permission value
                  value:
                    error: >-
                      Invalid packages_and_scopes_permission. Must be one of:
                      no-access, read-only, read-write
                invalidOrgsPermission:
                  summary: Invalid orgs_permission value
                  value:
                    error: >-
                      Invalid orgs_permission. Must be one of: no-access,
                      read-only, read-write
                noScopes:
                  summary: 'No packages, scopes, or organizations specified'
                  value:
                    error: >-
                      You must have at least one package / scope or organization
                      added to this token.
                noOrgsWithPermission:
                  summary: Organization permission set but no organizations specified
                  value:
                    error: >-
                      You must select at least one organization if granting
                      organization permissions to this token.
                noPackagesOrScopesWithPermission:
                  summary: >-
                    Package/scope permission set but no packages or scopes
                    specified
                  value:
                    error: >-
                      You must select at least one package or scope if granting
                      package/scopes permissions to this token.
                allPermissionsNoAccess:
                  summary: All permissions set to no-access
                  value:
                    error: >-
                      Please select at least one: package, scope or
                      organization.
                expirationLimit:
                  summary: Expiration exceeds maximum for read-write tokens
                  value:
                    error: >-
                      Read-write tokens cannot have expiration longer than 90
                      days
        '401':
          $ref: '#/components/responses/UnauthorizedWithWebAuth'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    get:
      tags:
        - Tokens
      summary: List npm access tokens
      description: >
        List all access tokens associated with the authenticated user's account.


        **Requirements:**

        - Must be authenticated with a valid Bearer token



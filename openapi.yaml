    UnauthorizedWithWebAuth:
      description: >
        Unauthorized - Authentication scenarios based on 2FA status and header
        presence.


        **Authentication Scenarios:**


        1. **No Authorization header**: Returns generic "Unauthorized" error
        when no Bearer token is provided or the token is invalid

        2. **No 2FA enabled + npm-otp header omitted**: Returns error requesting
        email OTP. An email is automatically sent to the user's registered email
        address

        3. **2FA enabled + npm-otp header omitted (legacy flow)**: Returns 2FA
        error with npm-notice header containing WebAuthn URL. This is for older
        CLI versions without web auth support

        4. **2FA enabled + npm-otp header omitted (web auth flow)**: Returns
        authentication URLs (authUrl and doneUrl) when both npm-auth-type=web
        and npm-command=token headers are present
      headers:
        npm-notice:
          description: >
            Notice header sent when 2FA is enabled and web auth headers are not
            present.

            Contains URL for WebAuthn security key authentication.
          schema:
            type: string
          example: >-
            Open https://www.npmjs.com/login/<uuid> to use your security key for
            authentication
      content:
        application/json:
          schema:
            oneOf:
              - type: object
                description: Error response for missing authentication or OTP
                properties:
                  error:
                    type: string
                required:
                  - error
              - type: object
                description: Web authentication flow response
                properties:
                  authUrl:
                    type: string
                    format: uri
                    description: URL to authenticate via web browser
                  doneUrl:
                    type: string
                    format: uri
                    description: URL to poll for completion of authentication
                required:
                  - authUrl
                  - doneUrl
          examples:
            unauthorized:
              summary: No Authorization header provided
              description: >
                When no Authorization header is provided or the token is
                invalid.
              value:
                error: Unauthorized
            no_2fa_missing_otp:
              summary: No 2FA enabled + npm-otp header omitted
              description: >
                When user has no 2FA enabled and omits the `npm-otp` header.


                An email OTP is automatically sent to the user's registered
                email address.

                The user should check their email and retry the request with the
                received OTP.
              value:
                error: A One Time Password (OTP) by email is required.
            with_2fa_missing_otp:
              summary: 2FA enabled + npm-otp header omitted (legacy flow)
              description: >
                When user has 2FA enabled, omits the `npm-otp` header, and
                doesn't include web auth headers. This is a legacy notice
                supported in older versions of the CLI without support for
                `npm-auth-type=web`.


                **Response includes npm-notice header:**


                > `npm-notice: Open https://www.npmjs.com/login/<uuid> to use
                your security key for authentication`
              value:
                error: >-
                  You must provide a one-time pass. Upgrade your client to
                  npm@latest in order to use 2FA.
            web_auth_flow:
              summary: 2FA enabled + npm-otp header omitted (web auth flow)
              description: >
                When user has 2FA enabled, omits the `npm-otp` header, and
                includes both `npm-auth-type=web` and `npm-command=token`
                headers.
              value:
                authUrl: >-
                  https://www.npmjs.com/auth/cli/00000000-0000-0000-0000-000000000000
                doneUrl: >-
                  https://registry.npmjs.org/-/v1/done?authId=00000000-0000-0000-0000-000000000000
  schemas:
    StagePackageList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/StagePackageVersion'
          description: List of staged package versions for the authenticated user.
        page:
          type: integer
          description: The current page number (0-indexed).
        perPage:
          type: integer
          description: The number of items returned per page.
        total:
          type: integer
          description: The total number of staged package versions available.
    StagePackageVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the staged package version.
        packageName:
          type: string
          description: The name of the package.
        version:
          type: string
          description: The version of the package that is being staged.
        tag:
          type: string
          description: The dist-tag associated with the staged package version.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the item was staged.
        actor:
          type: string
          description: The username of the user who staged the package version.
        actorType:
          type: string
          description: 'The type of the actor (e.g., user, trusted automation).'
        access:
          type: string
          description: >
            The access level for the staged package version. 'public' or
            'private'.
          enum:
            - public
            - private
        shasum:
          type: string
          description: The shasum of the package tarball.
    StagedPackumentRequest:
      type: object
      required:
        - name
        - versions
        - _attachments
      properties:
        _id:
          type: string
          description: 'The package name, including scope if applicable.'
        name:
          type: string
          description: 'The name of the package, including scope if applicable.'
        description:
          type: string
          description: A short description of the package.
        version:
          type: string
          description: >
            The latest version string. Informational; the actual version to
            publish is determined by the first key in the `versions` object.
        access:
          type: string
          description: |
            The access level for the package. 'public' or 'private'.
          enum:
            - public
            - private
        versions:
          type: object
          description: >
            An object where each key is a semver version string and the value is
            the version metadata. The registry assumes the FIRST key in this
            object is the newest version being published. Only include the
            single new version being published.
          additionalProperties:
            type: object
            description: >
              Version-specific metadata (package.json contents for this
              version).
            properties:
              _npmUser:
                type: object
                description: >
                  The user publishing this version. Should include at least the
                  `name` field.
        dist-tags:
          type: object
          description: >
            Mapping of distribution tags to semver version strings. e.g.,
            {"latest": "1.2.3"}
          additionalProperties:
            type: string
        readme:
          type: string
          description: The README content for the package.
        maintainers:
          type: array
          description: List of package maintainers.
          items:
            type: object
            properties:
              name:
                type: string
              email:
                type: string
        author:
          type: string
          description: The package author.
        license:
          type: string
          description: The SPDX license identifier.
        repository:
          type: object
          description: The source code repository.
          properties:
            type:
              type: string
            url:
              type: string
        main:
          type: string
          description: The entry point module.
        scripts:
          type: object
          description: Package scripts.
          additionalProperties:
            type: string
        _nodeVersion:
          type: string
          description: |
            The version of node used to publish the package.
        _npmVersion:
          type: string
          description: |
            The version of npm used to publish the package.
        _attachments:
          type: object
          description: >
            An object containing the binary attachments. Each key is an
            attachment name (typically `{version}.tgz` for the tarball). The
            first attachment with `content_type: 'application/octet-stream'` is
            treated as the tarball; if no content_type is set, the first
            attachment is used. An optional sigstore provenance bundle
            attachment may also be included.
          additionalProperties:
            type: object
            required:
              - data
            properties:
              data:
                type: string
                description: >
                  The base64-encoded binary data of the attachment (tarball or
                  provenance bundle).
              content_type:
                type: string
                description: >
                  The MIME type of the attachment. Use
                  `application/octet-stream` for the tarball. 
                    For sigstore provenance bundles, use 
                enum:
                  - application/octet-stream
                  - application/vnd.dev.sigstore.bundle+json;version=0.3
        _rev:
          type: string
          description: >
            Packument document revision. May be included when updating an
            existing package.

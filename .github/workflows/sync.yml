name: Sync NPM Registry OpenAPI Schema

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  check-for-updates:
    name: Check upstream for updates
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      latest_sha: ${{ steps.upstream.outputs.latest_sha }}
      changed: ${{ steps.upstream.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check upstream for OpenAPI schema changes
        id: upstream
        env:
          # https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/use-github-cli
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIOUS_SHA=""
          if [ -f ".npm-api-sha" ]; then
            PREVIOUS_SHA=$(cat ".npm-api-sha")
          fi

          OWNER="npm"
          REPO="api-documentation"
          PATH="api" # Location of schemas

          # SHA of the most recent commit that touched the schema directory
          LATEST_SHA=$(curl --fail --location --silent \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${OWNER}/${REPO}/commits?path=${PATH}&per_page=1" \
            | jq --raw-output '.[0].sha')

          if [[ -z "$LATEST_SHA" || "$LATEST_SHA" == "null" ]]; then
            echo "::error::Could not retrieve upstream SHA. Check GitHub API access."
            exit 1
          fi

          echo "latest_sha=$LATEST_SHA" >> "$GITHUB_OUTPUT"

          echo "Previous SHA        : ${PREVIOUS_SHA:-<none>}"
          echo "Latest upstream SHA : $LATEST_SHA"

          if [[ "$LATEST_SHA" == "$PREVIOUS_SHA" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date. Exiting..."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New commits detected in ${PATH}. Regenerating OpenAPI schema..."
          fi

  sync:
    name: Regenerate OpenAPI schema
    permissions:
      contents: write
      pull-requests: write
    needs: check-for-updates
    if: needs.check-for-updates.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          # https://github.com/npm/api-documentation/blob/5d24314331f8b0bcb64519db1ee5b1c7b7c85d88/.github/workflows/ci.yml#L36
          node-version: 22.x
          cache: "npm"

      - name: Clone npm/api-documentation and generate schema
        run: |
          git clone --depth=1 https://github.com/npm/api-documentation.git $RUNNER_TEMP/npm-api
          cd $RUNNER_TEMP/npm-api
          npm ci
          npm run generate # writes $RUNNER_TEMP/npm-api/openapi.yaml

      - name: Copy generated schema
        run: |
          cp $RUNNER_TEMP/npm-api/openapi.yaml ./openapi.yaml
          # Convert YAML to JSON
          yq --output-format json openapi.yaml > openapi.json
          # Record which upstream commit we just processed
          echo "${{ needs.check-for-updates.outputs.latest_sha }}" > .npm-api-sha

      - name: Open or update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync/npm-registry-openapi
          delete-branch: true
          commit-message: |
            chore: sync npm registry OpenAPI schema

            Upstream commit: ${{ needs.check-for-updates.outputs.latest_sha }}
          title: "chore: sync NPM Registry OpenAPI schema"
          body: |
            ## NPM API documentation updated

            The `api/` directory in [npm/api-documentation](https://github.com/npm/api-documentation)
            has new commits since the last sync.

            **Upstream commit:** [`${{ needs.check-for-updates.outputs.latest_sha }}`](https://github.com/npm/api-documentation/commit/${{ needs.check-for-updates.outputs.latest_sha }}')

            ### What changed
            Review the diff on `openapi.yaml` / `openapi.json` for the full schema delta.

            ---
            *Auto-generated by the [sync workflow](.github/workflows/sync.yml).*
          labels: |
            automated
            openapi

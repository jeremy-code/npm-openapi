                          description: List of CIDR ranges that can use this token
                          nullable: true
                        revoked:
                          type: string
                          format: date-time
                          description: >-
                            Timestamp when the token was revoked. null for
                            active tokens
                          nullable: true
                        created:
                          type: string
                          format: date-time
                          description: Timestamp when the token was created
                        updated:
                          type: string
                          format: date-time
                          description: Timestamp when the token was last updated
                        accessed:
                          type: string
                          format: date-time
                          description: Timestamp when the token was last accessed
                          nullable: true
                        permissions:
                          type: array
                          items:
                            type: object
                            properties:
                              name:

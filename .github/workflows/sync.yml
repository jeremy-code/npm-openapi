name: Sync NPM Registry OpenAPI Schema

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Check upstream and sync schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check upstream for api/ changes
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # SHA of the most recent commit that touched the api/ directory
          LATEST_SHA=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/npm/api-documentation/commits?path=api&per_page=1" \
            | jq -r '.[0].sha')

          if [[ -z "$LATEST_SHA" || "$LATEST_SHA" == "null" ]]; then
            echo "::error::Could not retrieve upstream SHA. Check GitHub API access."
            exit 1
          fi

          echo "latest_sha=$LATEST_SHA" >> "$GITHUB_OUTPUT"

          STORED_SHA=$(cat .npm-api-sha 2>/dev/null || echo "")
          echo "Upstream SHA : $LATEST_SHA"
          echo "Stored SHA   : ${STORED_SHA:-<none yet — first run>}"

          if [[ "$LATEST_SHA" == "$STORED_SHA" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date. Nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New commits detected in api/ — will regenerate schema."
          fi

      - name: Set up Node.js
        if: steps.upstream.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone npm/api-documentation and generate schema
        if: steps.upstream.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/npm/api-documentation.git /tmp/npm-api
          cd /tmp/npm-api
          npm ci
          npm run generate   # → writes openapi.yaml to /tmp/npm-api/openapi.yaml

      - name: Copy generated schema
        if: steps.upstream.outputs.changed == 'true'
        run: |
          cp /tmp/npm-api/openapi.yaml ./openapi.yaml
          # Record which upstream commit we just processed
          echo "${{ steps.upstream.outputs.latest_sha }}" > .npm-api-sha

      - name: Convert YAML schema to JSON
        if: steps.upstream.outputs.changed == 'true'
        run: |
          python3 -c "
          import yaml, json
          schema = yaml.safe_load(open('openapi.yaml').read())
          json.dump(schema, open('openapi.json', 'w'), indent=2)
          print('openapi.json written.')
          "
      - name: Open or update pull request
        if: steps.upstream.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync/npm-registry-openapi
          delete-branch: true
          commit-message: |
            chore: sync npm registry OpenAPI schema

            Upstream commit: ${{ steps.upstream.outputs.latest_sha }}
          title: "chore: sync NPM Registry OpenAPI schema"
          body: |
            ## NPM API documentation updated

            The `api/` directory in [npm/api-documentation](https://github.com/npm/api-documentation)
            has new commits since the last sync.

            **Upstream commit:** [`${{ steps.upstream.outputs.latest_sha }}`](https://github.com/npm/api-documentation/commit/${{ steps.upstream.outputs.latest_sha }})

            ### What changed
            Review the diff on `openapi.yaml` / `openapi.json` for the full schema delta.

            ---
            *Auto-generated by the [sync workflow](.github/workflows/sync.yml).*
          labels: |
            automated
            openapi

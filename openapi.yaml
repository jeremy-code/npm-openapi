            - An npm token (e.g., `npm_abcdefghijklmnopqrstuvwxyz0123456789`)
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
            pattern: ^Bearer .+
          description: |
            Bearer token for authentication. Must be an npm access token.

            **Format:** `Bearer <token>`
        - name: npm-otp
          in: header
          required: false
          schema:
            type: string
          description: >
            One-time password for two-factor authentication. Required if the
